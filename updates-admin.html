<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Updates Admin | DC Environmental</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --forest: #1a4a2e; --leaf: #2e7d52; --sage: #5a9e7a;
    --cream: #faf8f4; --sand: #f0ede6; --border: #c2d9cc;
    --gray: #5a5a5a; --charcoal: #1c1c1c; --white: #ffffff; --red: #c0392b;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--charcoal); min-height: 100vh; }

  /* ── Login Screen ── */
  #login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(160deg, var(--forest) 0%, #1b3a5c 100%);
  }
  .login-box {
    background: var(--white); border-radius: 16px; padding: 3rem 2.5rem;
    width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); text-align: center;
  }
  .login-logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--forest); margin-bottom: 0.25rem; }
  .login-sub { font-size: 0.8rem; color: var(--gray); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2rem; }
  .login-box label { display: block; text-align: left; font-size: 0.78rem; font-weight: 600; color: var(--forest); margin-bottom: 0.4rem; }
  .login-box input[type="email"],
  .login-box input[type="password"] {
    width: 100%; padding: 0.7rem 1rem; border: 1.5px solid var(--border);
    border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
    outline: none; margin-bottom: 1.25rem; transition: border-color 0.2s; background: var(--cream);
  }
  .login-box input:focus { border-color: var(--leaf); box-shadow: 0 0 0 3px rgba(46,125,82,0.12); background: white; }
  .btn-login {
    width: 100%; padding: 0.8rem; background: var(--forest); color: white;
    border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  }
  .btn-login:hover { background: var(--leaf); }
  .btn-login:disabled { opacity: 0.65; cursor: not-allowed; }
  .login-error {
    color: var(--red); font-size: 0.82rem; margin-top: 0.75rem;
    background: #fff5f4; border: 1px solid #f5c6c2; border-radius: 8px;
    padding: 0.6rem 1rem; display: none; text-align: left;
  }
  .login-notice {
    font-size: 0.75rem; color: var(--gray); margin-top: 1.25rem; line-height: 1.5;
  }

  /* ── Admin Panel ── */
  #admin-panel { display: none; }
  .admin-header {
    background: var(--forest); color: white; padding: 1rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .admin-header-left h1 { font-family: 'Playfair Display', serif; font-size: 1.2rem; }
  .admin-header-left span { font-size: 0.78rem; color: rgba(255,255,255,0.55); }
  .admin-header-right { display: flex; align-items: center; gap: 1rem; }
  .admin-user-badge {
    font-size: 0.78rem; color: rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    padding: 0.35rem 0.85rem; border-radius: 100px;
  }
  .btn-logout {
    padding: 0.4rem 1rem; background: rgba(255,255,255,0.12); color: white;
    border: 1px solid rgba(255,255,255,0.25); border-radius: 6px;
    font-family: 'DM Sans', sans-serif; font-size: 0.82rem; cursor: pointer;
    transition: background 0.2s;
  }
  .btn-logout:hover { background: rgba(192,57,43,0.5); border-color: rgba(192,57,43,0.6); }

  .admin-body { max-width: 860px; margin: 0 auto; padding: 2.5rem 1.5rem; }

  .form-card {
    background: var(--white); border: 1.5px solid var(--border);
    border-radius: 14px; padding: 2rem; margin-bottom: 2.5rem;
    box-shadow: 0 2px 16px rgba(26,74,46,0.08);
  }
  .form-card h2 { font-family: 'Playfair Display', serif; color: var(--forest); font-size: 1.2rem; margin-bottom: 1.5rem; }
  .form-group { margin-bottom: 1.1rem; }
  .form-group label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--forest); margin-bottom: 0.35rem; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: 0.65rem 0.9rem; border: 1.5px solid var(--border);
    border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
    color: var(--charcoal); background: var(--cream); outline: none; resize: vertical;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
    border-color: var(--leaf); box-shadow: 0 0 0 3px rgba(46,125,82,0.12); background: white;
  }
  .form-group textarea { min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .btn-add {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.75rem 1.75rem; background: var(--leaf); color: white;
    border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif;
    font-weight: 600; font-size: 0.9rem; cursor: pointer;
    transition: background 0.2s; box-shadow: 0 3px 14px rgba(46,125,82,0.28);
  }
  .btn-add:hover { background: var(--forest); }
  .btn-add:disabled { opacity: 0.6; cursor: not-allowed; }

  .posts-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
  .posts-header h2 { font-family: 'Playfair Display', serif; color: var(--forest); font-size: 1.2rem; }
  .posts-count { font-size: 0.8rem; color: var(--gray); }

  .post-item {
    background: var(--white); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1rem;
    display: flex; align-items: flex-start; gap: 1rem;
    box-shadow: 0 1px 8px rgba(26,74,46,0.06); transition: border-color 0.2s;
  }
  .post-item:hover { border-color: var(--sage); }
  .post-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--leaf); flex-shrink: 0; margin-top: 5px; }
  .post-dot.inactive { background: var(--border); }
  .post-info { flex: 1; min-width: 0; }
  .post-title { font-weight: 600; font-size: 0.95rem; color: var(--charcoal); margin-bottom: 0.25rem; }
  .post-meta { font-size: 0.78rem; color: var(--gray); margin-bottom: 0.35rem; }
  .post-url { font-size: 0.78rem; color: var(--leaf); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 400px; display: block; }
  .post-category {
    display: inline-block; font-size: 0.68rem; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; padding: 0.2rem 0.6rem; border-radius: 100px;
    background: rgba(46,125,82,0.1); color: var(--leaf); border: 1px solid rgba(46,125,82,0.2); margin-top: 0.4rem;
  }
  .post-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
  .btn-edit, .btn-delete, .btn-toggle {
    padding: 0.35rem 0.75rem; border-radius: 6px; font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem; font-weight: 600; cursor: pointer; border: 1.5px solid; transition: all 0.2s;
  }
  .btn-edit { background: transparent; color: var(--forest); border-color: var(--border); }
  .btn-edit:hover { background: var(--sand); border-color: var(--forest); }
  .btn-toggle { background: transparent; color: var(--gray); border-color: var(--border); }
  .btn-toggle:hover { background: var(--sand); }
  .btn-delete { background: transparent; color: var(--red); border-color: #f5c6c2; }
  .btn-delete:hover { background: #fff5f4; border-color: var(--red); }
  .empty-state { text-align: center; padding: 3rem; color: var(--gray); font-size: 0.9rem; }

  /* ── Edit Modal ── */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    backdrop-filter: blur(4px); z-index: 1000;
    display: none; align-items: center; justify-content: center; padding: 1rem;
  }
  .modal-bg.open { display: flex; }
  .modal-box { background: white; border-radius: 16px; padding: 2rem; width: 100%; max-width: 540px; }
  .modal-box h3 { font-family: 'Playfair Display', serif; color: var(--forest); margin-bottom: 1.5rem; }
  .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem; }
  .btn-cancel { padding: 0.65rem 1.25rem; background: var(--sand); color: var(--charcoal); border: 1.5px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; }
  .btn-save { padding: 0.65rem 1.5rem; background: var(--leaf); color: white; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-weight: 600; cursor: pointer; }
  .btn-save:hover { background: var(--forest); }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 2rem; right: 2rem; z-index: 9999;
    background: var(--forest); color: white; padding: 0.75rem 1.5rem;
    border-radius: 8px; font-size: 0.88rem; font-weight: 500;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    transform: translateY(100px); opacity: 0; transition: transform 0.3s, opacity 0.3s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* ── Loading overlay ── */
  #loading-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--cream);
  }
  .loading-spinner {
    width: 40px; height: 40px; border: 3px solid var(--border);
    border-top-color: var(--leaf); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
    .admin-header { flex-direction: column; gap: 0.75rem; align-items: flex-start; }
    .post-item { flex-direction: column; }
    .post-actions { width: 100%; }
  }
</style>
</head>
<body>

<!-- Loading state while Supabase checks session -->
<div id="loading-screen">
  <div class="loading-spinner"></div>
</div>

<!-- Login Screen -->
<div id="login-screen" style="display:none;">
  <div class="login-box">
    <div class="login-logo">DC Environmental</div>
    <div class="login-sub">Updates Admin Panel</div>
    <div class="form-group">
      <label for="login-email">Email</label>
      <input type="email" id="login-email" placeholder="dcenviadmin@gmail.com"
             onkeydown="if(event.key==='Enter')login()">
    </div>
    <div class="form-group">
      <label for="login-password">Password</label>
      <input type="password" id="login-password" placeholder="Your password"
             onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn-login" id="btn-login" onclick="login()">
      Sign In
    </button>
    <div class="login-error" id="login-error"></div>
    <p class="login-notice">Access restricted to authorized administrators only.</p>
  </div>
</div>

<!-- Admin Panel -->
<div id="admin-panel">
  <div class="admin-header">
    <div class="admin-header-left">
      <h1>Updates Manager</h1>
      <span>DC Environmental Consultancy Services</span>
    </div>
    <div class="admin-header-right">
      <span class="admin-user-badge" id="admin-user-email"></span>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <div class="admin-body">
    <!-- Add New Update Form -->
    <div class="form-card">
      <h2>➕ Add New Update</h2>
      <div class="form-row">
        <div class="form-group">
          <label>Title *</label>
          <input type="text" id="new-title" placeholder="e.g. Revised EIA Thresholds MC 2014-005">
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="new-category">
            <option value="EIA">EIA / ECC</option>
            <option value="Air">Air Quality</option>
            <option value="Water">Water Quality</option>
            <option value="Waste">Waste Management</option>
            <option value="PCO">Pollution Control</option>
            <option value="General">General / Other</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="new-desc" placeholder="Brief summary of what this law or mandate covers..."></textarea>
      </div>
      <div class="form-group">
        <label>Document URL *</label>
        <input type="url" id="new-url" placeholder="https://eia.emb.gov.ph/...">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Date Issued</label>
          <input type="text" id="new-date" placeholder="e.g. January 2014">
        </div>
        <div class="form-group">
          <label>Issuing Agency</label>
          <input type="text" id="new-agency" placeholder="e.g. DENR-EMB">
        </div>
      </div>
      <button class="btn-add" id="btn-add" onclick="addPost()">
        <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10 4v12M4 10h12"/></svg>
        Add Update
      </button>
    </div>

    <!-- Posts List -->
    <div class="posts-header">
      <h2>Published Updates</h2>
      <span class="posts-count" id="posts-count">Loading...</span>
    </div>
    <div id="posts-list"></div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-bg" id="edit-modal">
  <div class="modal-box">
    <h3>Edit Update</h3>
    <div class="form-group"><label>Title *</label><input type="text" id="edit-title"></div>
    <div class="form-group">
      <label>Category</label>
      <select id="edit-category">
        <option value="EIA">EIA / ECC</option>
        <option value="Air">Air Quality</option>
        <option value="Water">Water Quality</option>
        <option value="Waste">Waste Management</option>
        <option value="PCO">Pollution Control</option>
        <option value="General">General / Other</option>
      </select>
    </div>
    <div class="form-group"><label>Description</label><textarea id="edit-desc"></textarea></div>
    <div class="form-group"><label>Document URL *</label><input type="url" id="edit-url"></div>
    <div class="form-row">
      <div class="form-group"><label>Date Issued</label><input type="text" id="edit-date"></div>
      <div class="form-group"><label>Issuing Agency</label><input type="text" id="edit-agency"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEdit()">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ── Supabase config ──────────────────────────────
  const SUPABASE_URL = 'https://tjmgeqmilnhqcuenadtp.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_6pq_ZDhAZyxO1HxR5ndWxA_Gt7UvtmH';
  const TABLE = 'updates';

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  let posts = [];
  let editId = null;

  // ── On page load: check existing session ─────────
  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      showAdminPanel(session.user.email);
      loadPosts();
    } else {
      showLoginScreen();
    }
  }

  function showLoginScreen() {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('admin-panel').style.display = 'none';
  }

  function showAdminPanel(email) {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    document.getElementById('admin-user-email').textContent = email;
  }

  // ── Login ────────────────────────────────────────
  async function login() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl    = document.getElementById('login-error');
    const btn      = document.getElementById('btn-login');

    if (!email || !password) {
      errEl.textContent = 'Please enter your email and password.';
      errEl.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in...';
    errEl.style.display = 'none';

    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      errEl.textContent = 'Incorrect email or password. Please try again.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    } else {
      showAdminPanel(data.user.email);
      loadPosts();
    }
  }

  // ── Logout ───────────────────────────────────────
  async function logout() {
    await sb.auth.signOut();
    showLoginScreen();
    document.getElementById('login-email').value = '';
    document.getElementById('login-password').value = '';
    showToast('Signed out successfully.');
  }

  // ── Load posts ───────────────────────────────────
  async function loadPosts() {
    const { data, error } = await sb
      .from(TABLE)
      .select('*')
      .order('id', { ascending: false });

    if (error) { showToast('❌ Error loading posts.'); return; }
    posts = data;
    renderPosts();
  }

  // ── Render posts ─────────────────────────────────
  function renderPosts() {
    const list = document.getElementById('posts-list');
    document.getElementById('posts-count').textContent =
      posts.length + ' update' + (posts.length !== 1 ? 's' : '');

    if (!posts.length) {
      list.innerHTML = '<div class="empty-state">No updates yet. Add your first one above!</div>';
      return;
    }

    list.innerHTML = posts.map(p => `
      <div class="post-item">
        <div class="post-dot ${p.active ? '' : 'inactive'}"></div>
        <div class="post-info">
          <div class="post-title">${p.title}</div>
          <div class="post-meta">${p.agency || ''}${p.date ? ' · ' + p.date : ''}</div>
          <a class="post-url" href="${p.url}" target="_blank" rel="noopener">${p.url}</a>
          <span class="post-category">${p.category}</span>
        </div>
        <div class="post-actions">
          <button class="btn-toggle" onclick="togglePost(${p.id}, ${p.active})">
            ${p.active ? 'Hide' : 'Show'}
          </button>
          <button class="btn-edit" onclick="openEdit(${p.id})">Edit</button>
          <button class="btn-delete" onclick="deletePost(${p.id})">Delete</button>
        </div>
      </div>
    `).join('');
  }

  // ── Add post ─────────────────────────────────────
  async function addPost() {
    const title = document.getElementById('new-title').value.trim();
    const url   = document.getElementById('new-url').value.trim();
    if (!title || !url) { showToast('⚠️ Title and URL are required!'); return; }

    const btn = document.getElementById('btn-add');
    btn.disabled = true;
    btn.innerHTML = `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 0.8s linear infinite"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg> Saving...`;

    const { error } = await sb.from(TABLE).insert([{
      title,
      category: document.getElementById('new-category').value,
      description: document.getElementById('new-desc').value.trim(),
      url,
      date: document.getElementById('new-date').value.trim(),
      agency: document.getElementById('new-agency').value.trim(),
      active: true
    }]);

    btn.disabled = false;
    btn.innerHTML = `<svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10 4v12M4 10h12"/></svg> Add Update`;

    if (error) {
      showToast('❌ Error saving. Please try again.');
    } else {
      ['new-title','new-desc','new-url','new-date','new-agency'].forEach(id => {
        document.getElementById(id).value = '';
      });
      showToast('✅ Update added! Live on site now.');
      loadPosts();
    }
  }

  // ── Delete post ──────────────────────────────────
  async function deletePost(id) {
    if (!confirm('Delete this update? This cannot be undone.')) return;
    const { error } = await sb.from(TABLE).delete().eq('id', id);
    if (error) { showToast('❌ Error deleting.'); return; }
    showToast('🗑 Deleted.');
    loadPosts();
  }

  // ── Toggle visibility ────────────────────────────
  async function togglePost(id, current) {
    const { error } = await sb.from(TABLE).update({ active: !current }).eq('id', id);
    if (error) { showToast('❌ Error updating.'); return; }
    showToast(!current ? '✅ Now visible on site.' : '👁 Hidden from site.');
    loadPosts();
  }

  // ── Edit modal ───────────────────────────────────
  function openEdit(id) {
    const p = posts.find(x => x.id === id);
    editId = id;
    document.getElementById('edit-title').value    = p.title;
    document.getElementById('edit-category').value = p.category;
    document.getElementById('edit-desc').value     = p.description || '';
    document.getElementById('edit-url').value      = p.url;
    document.getElementById('edit-date').value     = p.date || '';
    document.getElementById('edit-agency').value   = p.agency || '';
    document.getElementById('edit-modal').classList.add('open');
  }

  function closeEdit() {
    document.getElementById('edit-modal').classList.remove('open');
    editId = null;
  }

  async function saveEdit() {
    const title = document.getElementById('edit-title').value.trim();
    const url   = document.getElementById('edit-url').value.trim();
    if (!title || !url) { showToast('⚠️ Title and URL are required!'); return; }

    const { error } = await sb.from(TABLE).update({
      title,
      category:    document.getElementById('edit-category').value,
      description: document.getElementById('edit-desc').value.trim(),
      url,
      date:        document.getElementById('edit-date').value.trim(),
      agency:      document.getElementById('edit-agency').value.trim()
    }).eq('id', editId);

    if (error) { showToast('❌ Error saving changes.'); return; }
    showToast('✅ Changes saved!');
    closeEdit();
    loadPosts();
  }

  // ── Close edit modal on backdrop click ───────────
  document.getElementById('edit-modal').addEventListener('click', function(e) {
    if (e.target === this) closeEdit();
  });

  // ── Toast helper ─────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  // ── Spinner keyframe ─────────────────────────────
  const s = document.createElement('style');
  s.textContent = `@keyframes spin { to { transform: rotate(360deg); } }`;
  document.head.appendChild(s);

  // ── Boot ─────────────────────────────────────────
  init();
</script>
</body>
</html>
