<!-- ── DENR Updates & Mandates ── -->
<section class="section section--alt" id="updates" aria-labelledby="updates-heading">
  <div class="container">
    <div class="section-label">Regulatory Updates</div>
    <h2 id="updates-heading" class="section-title">DENR Laws & Mandates</h2>
    <div class="divider"></div>
    <p class="section-subtitle">Stay informed on the latest environmental regulations, memorandum circulars, and administrative orders affecting your business.</p>

    <div id="updates-grid" style="margin-top:2.5rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.25rem;">
      <!-- Posts load here from updates.json -->
      <div style="text-align:center;padding:3rem;color:var(--gray);grid-column:1/-1;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="32" height="32" style="margin:0 auto 1rem;display:block;opacity:0.4;"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
        Loading updates...
      </div>
    </div>
  </div>
</section>

<!-- ── Script: Load updates from updates.json ── -->
<script>
(function() {
  const CATEGORY_COLORS = {
    'EIA':     { bg: 'rgba(46,125,82,0.08)',  border: 'rgba(46,125,82,0.25)',  text: '#1a4a2e' },
    'Air':     { bg: 'rgba(27,79,114,0.08)',  border: 'rgba(27,79,114,0.25)',  text: '#1b3a5c' },
    'Water':   { bg: 'rgba(46,134,193,0.08)', border: 'rgba(46,134,193,0.25)', text: '#1a5276' },
    'Waste':   { bg: 'rgba(120,100,50,0.08)', border: 'rgba(120,100,50,0.25)', text: '#5c4a1a' },
    'PCO':     { bg: 'rgba(155,89,182,0.08)', border: 'rgba(155,89,182,0.25)', text: '#6c3483' },
    'General': { bg: 'rgba(90,90,90,0.08)',   border: 'rgba(90,90,90,0.25)',   text: '#3a3a3a' },
  };

  function renderUpdates(posts) {
    const grid = document.getElementById('updates-grid');
    if (!posts || posts.length === 0) {
      grid.innerHTML = '<p style="text-align:center;color:var(--gray);grid-column:1/-1;">No updates available at this time.</p>';
      return;
    }

    grid.innerHTML = posts.map(p => {
      const c = CATEGORY_COLORS[p.category] || CATEGORY_COLORS['General'];
      return `
        <a href="${p.url}" target="_blank" rel="noopener"
           style="display:block;text-decoration:none;background:var(--white);border:1.5px solid var(--border);
                  border-radius:12px;padding:1.5rem;
                  transition:box-shadow 0.25s,border-color 0.25s,transform 0.25s;
                  box-shadow:0 2px 12px rgba(26,74,46,0.07);"
           onmouseover="this.style.boxShadow='0 8px 28px rgba(26,74,46,0.14)';this.style.borderColor='var(--sage)';this.style.transform='translateY(-3px)'"
           onmouseout="this.style.boxShadow='0 2px 12px rgba(26,74,46,0.07)';this.style.borderColor='var(--border)';this.style.transform='translateY(0)'">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:0.75rem;margin-bottom:0.85rem;">
            <span style="display:inline-block;font-size:0.68rem;font-weight:700;letter-spacing:0.08em;
                         text-transform:uppercase;padding:0.25rem 0.7rem;border-radius:100px;
                         background:${c.bg};border:1px solid ${c.border};color:${c.text};">${p.category}</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--sage)" stroke-width="1.8"
                 width="16" height="16" style="flex-shrink:0;margin-top:2px;">
              <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
              <path d="M15 3h6v6M10 14L21 3"/>
            </svg>
          </div>
          <h3 style="font-family:'Playfair Display',serif;font-size:0.98rem;font-weight:600;
                     color:var(--forest);line-height:1.4;margin-bottom:0.6rem;">${p.title}</h3>
          ${p.description ? `<p style="font-size:0.83rem;color:var(--gray);line-height:1.6;margin-bottom:0.85rem;">${p.description}</p>` : ''}
          <div style="display:flex;align-items:center;gap:0.5rem;margin-top:auto;
                      font-size:0.75rem;color:var(--gray);border-top:1px solid var(--border);
                      padding-top:0.75rem;">
            ${p.agency ? `<span style="font-weight:600;color:var(--leaf);">${p.agency}</span>` : ''}
            ${p.agency && p.date ? '<span>·</span>' : ''}
            ${p.date ? `<span>${p.date}</span>` : ''}
            <span style="margin-left:auto;color:var(--leaf);font-weight:500;">View PDF →</span>
          </div>
        </a>
      `;
    }).join('');
  }

  // Try loading from updates.json, fall back to empty
  fetch('updates.json?v=' + Date.now())
    .then(r => r.json())
    .then(data => renderUpdates(data))
    .catch(() => renderUpdates([]));
})();
</script>
